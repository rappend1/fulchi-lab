<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tablero de Pedidos — FullFarma Laboratorio</title>
<style>
:root {
  --verde:#27500A;--vbg:#EAF3DE;--vmid:#639922;--vb:#C0DD97;
  --azul:#0C447C;--abg:#E6F1FB;--ab:#85B7EB;
  --am:#633806;--ambg:#FAEEDA;--abb:#FAC775;
  --rojo:#791F1F;--rbg:#FCEBEB;--rb:#F09595;
  --violeta:#3C3489;--vibg:#EEEDFE;--vib:#B5B0F5;
  --gt:#444441;--gl:#F4F2EB;--gb:#D3D1C7;--gm:#888780;
  --negro:#1a1a1a;--blanco:#ffffff;
  --f:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--f);background:var(--gl);color:var(--gt)}

/* ── HEADER ─────────────────────────────────────────────────── */
.header{
  background:var(--blanco);border-bottom:1px solid var(--gb);
  padding:12px 20px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:100;
  gap:12px;
}
.header-brand{display:flex;align-items:center;gap:10px}
.hlogo{width:36px;height:36px;background:var(--vbg);border-radius:9px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hlogo svg{width:20px;height:20px;stroke:var(--verde);fill:none;stroke-width:1.8;
  stroke-linecap:round;stroke-linejoin:round}
.header h1{font-size:14px;font-weight:600;color:var(--negro)}
.header p{font-size:11px;color:var(--gm)}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.btn-add{
  display:flex;align-items:center;gap:5px;
  padding:7px 13px;border:none;border-radius:8px;
  background:var(--verde);color:var(--blanco);
  font-size:12px;font-weight:600;cursor:pointer;
  transition:background .15s;white-space:nowrap;
}
.btn-add:hover{background:#1e3d08}
.btn-add svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round}
.badge-total{
  background:var(--abg);color:var(--azul);
  font-size:11px;font-weight:600;
  padding:4px 10px;border-radius:20px;white-space:nowrap;
}

/* ── FILTROS ─────────────────────────────────────────────────── */
.filter-bar{
  background:var(--blanco);border-bottom:1px solid var(--gb);
  padding:8px 20px;display:flex;align-items:center;gap:8px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
}
.filter-bar::-webkit-scrollbar{height:0}
.filter-btn{
  padding:5px 12px;border:1px solid var(--gb);border-radius:20px;
  font-size:12px;background:var(--blanco);color:var(--gt);
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.filter-btn.on{background:var(--azul);color:var(--blanco);border-color:var(--azul)}
.filter-sep{width:1px;height:18px;background:var(--gb);flex-shrink:0}
.search-wrap{position:relative;flex-shrink:0}
.search-wrap input{
  padding:5px 10px 5px 28px;border:1px solid var(--gb);border-radius:20px;
  font-size:12px;font-family:var(--f);color:var(--negro);background:var(--blanco);
  width:160px;transition:border-color .15s;
}
.search-wrap input:focus{outline:none;border-color:var(--ab)}
.search-wrap svg{
  position:absolute;left:9px;top:50%;transform:translateY(-50%);
  width:13px;height:13px;stroke:var(--gm);fill:none;stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round;pointer-events:none;
}

/* ── BOARD ────────────────────────────────────────────────────── */
.board{
  display:flex;gap:12px;padding:16px 20px 32px;
  overflow-x:auto;align-items:flex-start;min-height:calc(100vh - 110px);
  -webkit-overflow-scrolling:touch;
}
.board::-webkit-scrollbar{height:6px}
.board::-webkit-scrollbar-track{background:transparent}
.board::-webkit-scrollbar-thumb{background:var(--gb);border-radius:3px}

/* ── COLUMNAS ────────────────────────────────────────────────── */
.col{
  flex:0 0 240px;display:flex;flex-direction:column;
  background:var(--blanco);border-radius:var(--radius);
  border:1px solid var(--gb);overflow:hidden;
  transition:box-shadow .2s;
}
.col.drag-over{box-shadow:0 0 0 2px var(--azul);border-color:var(--azul)}
.col-header{padding:11px 13px 10px;border-bottom:1px solid var(--gb)}
.col-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-right:7px}
.col-name{font-size:12px;font-weight:600;color:var(--negro);display:flex;align-items:center}
.col-count{
  font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;
}
.col-eta{font-size:10px;color:var(--gm);padding-left:15px}
.cards{
  padding:10px;display:flex;flex-direction:column;gap:8px;
  min-height:80px;flex:1;
}
.empty-col{
  text-align:center;padding:20px 12px;
  font-size:11px;color:var(--gm);line-height:1.6;
  border:1.5px dashed var(--gb);border-radius:8px;
  margin:4px;
}

/* Colores por columna */
.col[data-col="recibido"] .col-dot{background:#64b5f6}
.col[data-col="recibido"] .col-count{background:#E3F2FD;color:#1565C0}
.col[data-col="presupuestado"] .col-dot{background:var(--abb)}
.col[data-col="presupuestado"] .col-count{background:var(--ambg);color:var(--am)}
.col[data-col="elaboracion"] .col-dot{background:var(--vib)}
.col[data-col="elaboracion"] .col-count{background:var(--vibg);color:var(--violeta)}
.col[data-col="listo"] .col-dot{background:var(--vmid)}
.col[data-col="listo"] .col-count{background:var(--vbg);color:var(--verde)}
.col[data-col="entregado"] .col-dot{background:var(--gm)}
.col[data-col="entregado"] .col-count{background:var(--gl);color:var(--gm)}

/* ── TARJETAS ─────────────────────────────────────────────────── */
.card{
  background:var(--blanco);border:1px solid var(--gb);border-radius:9px;
  padding:11px 12px;cursor:grab;
  transition:box-shadow .15s,transform .15s,opacity .15s;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;
}
.card[data-urg="urgente"]::before{background:var(--rojo)}
.card[data-urg="normal"]::before{background:var(--gb)}
.card:hover{box-shadow:0 2px 10px rgba(0,0,0,.1);transform:translateY(-1px)}
.card.dragging{opacity:.4;transform:scale(.97)}
.card.new-flash{animation:flash .6s ease}
@keyframes flash{0%{background:#FFF9C4}100%{background:var(--blanco)}}
.card-id{font-size:9.5px;color:var(--gm);font-family:monospace;margin-bottom:4px}
.card-name{font-size:13px;font-weight:600;color:var(--negro);line-height:1.3;margin-bottom:4px}
.card-meta{font-size:11px;color:var(--gm);margin-bottom:6px;line-height:1.5}
.card-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px}
.tag-suc{background:var(--abg);color:var(--azul)}
.tag-urg{background:var(--rbg);color:var(--rojo)}
.tag-new{background:var(--ambg);color:var(--am)}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.card-date{font-size:10px;color:var(--gm)}
.card-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
.card:hover .card-actions{opacity:1}
.card-btn{
  width:24px;height:24px;border:none;border-radius:6px;
  background:var(--gl);color:var(--gm);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s;
}
.card-btn:hover{background:var(--gb);color:var(--negro)}
.card-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round}
.days-badge{
  font-size:9.5px;font-weight:600;padding:2px 6px;border-radius:20px;
}
.days-ok{background:var(--vbg);color:var(--verde)}
.days-warn{background:var(--ambg);color:var(--am)}
.days-late{background:var(--rbg);color:var(--rojo)}

/* ── MODAL DETALLE ────────────────────────────────────────────── */
.modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.45);z-index:200;
  align-items:center;justify-content:center;padding:16px;
}
.modal-bg.open{display:flex}
.modal{
  background:var(--blanco);border-radius:14px;
  width:100%;max-width:480px;max-height:90vh;
  overflow-y:auto;animation:mIn .2s ease;
}
@keyframes mIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal-hdr{
  padding:16px 18px;border-bottom:1px solid var(--gb);
  display:flex;justify-content:space-between;align-items:flex-start;
  position:sticky;top:0;background:var(--blanco);z-index:2;
}
.modal-hdr h2{font-size:15px;font-weight:700;color:var(--negro);line-height:1.3}
.modal-close{
  width:28px;height:28px;border:none;border-radius:7px;
  background:var(--gl);cursor:pointer;color:var(--gm);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:16px;transition:background .15s;
}
.modal-close:hover{background:var(--gb)}
.modal-body{padding:16px 18px}
.modal-section{margin-bottom:14px}
.modal-label{font-size:10px;font-weight:600;color:var(--gm);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.modal-value{font-size:13px;color:var(--negro);line-height:1.5}
.modal-row{display:flex;gap:12px}
.modal-row .modal-section{flex:1}
.status-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.status-pill{
  padding:6px 12px;border-radius:20px;border:1.5px solid var(--gb);
  font-size:12px;font-weight:500;cursor:pointer;
  transition:all .15s;background:var(--blanco);color:var(--gt);
}
.status-pill.active{border-width:2px}
.status-pill[data-s="recibido"].active{background:#E3F2FD;border-color:#1565C0;color:#1565C0}
.status-pill[data-s="presupuestado"].active{background:var(--ambg);border-color:var(--am);color:var(--am)}
.status-pill[data-s="elaboracion"].active{background:var(--vibg);border-color:var(--violeta);color:var(--violeta)}
.status-pill[data-s="listo"].active{background:var(--vbg);border-color:var(--verde);color:var(--verde)}
.status-pill[data-s="entregado"].active{background:var(--gl);border-color:var(--gm);color:var(--gm)}
.modal-footer{
  padding:12px 18px;border-top:1px solid var(--gb);
  display:flex;gap:8px;
}
.btn-save{
  flex:1;padding:10px;border:none;border-radius:8px;
  background:var(--verde);color:var(--blanco);
  font-size:13px;font-weight:600;cursor:pointer;
  transition:background .15s;
}
.btn-save:hover{background:#1e3d08}
.btn-del{
  padding:10px 14px;border:none;border-radius:8px;
  background:var(--rbg);color:var(--rojo);
  font-size:13px;cursor:pointer;transition:background .15s;
}
.btn-del:hover{background:var(--rb)}

/* ── FORM NUEVO PEDIDO ────────────────────────────────────────── */
.form-modal{display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.45);z-index:200;
  align-items:flex-end;justify-content:center;
}
.form-modal.open{display:flex}
.form-box{
  background:var(--blanco);border-radius:16px 16px 0 0;
  width:100%;max-width:540px;max-height:92vh;overflow-y:auto;
  padding:20px 18px 28px;animation:slideUp .2s ease;
}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.form-title{font-size:15px;font-weight:700;color:var(--negro);margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:500;color:var(--negro);margin-bottom:4px}
.field label .req{color:#E24B4A}
.field input,.field select,.field textarea{
  width:100%;padding:9px 11px;border:1px solid var(--gb);border-radius:8px;
  font-size:13px;font-family:var(--f);color:var(--negro);background:var(--blanco);
  transition:border-color .15s;-webkit-appearance:none;
}
.field input:focus,.field select:focus,.field textarea:focus{
  outline:none;border-color:var(--ab);box-shadow:0 0 0 3px rgba(55,138,221,.1);
}
.field textarea{min-height:64px;resize:vertical;line-height:1.5}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-actions{display:flex;gap:8px;margin-top:14px}
.btn-cancel{
  flex:0 0 80px;padding:10px;border:1px solid var(--gb);border-radius:8px;
  background:var(--blanco);font-size:13px;color:var(--gt);cursor:pointer;
}
.btn-create{
  flex:1;padding:10px;border:none;border-radius:8px;
  background:var(--verde);color:var(--blanco);
  font-size:13px;font-weight:600;cursor:pointer;
}

/* ── TOAST ───────────────────────────────────────────────────── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--negro);color:var(--blanco);
  padding:9px 16px;border-radius:20px;font-size:12px;font-weight:500;
  z-index:999;white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .3s;
}
.toast.show{opacity:1}

/* ── INTEGRATION BANNER ──────────────────────────────────────── */
.int-banner{
  background:var(--vbg);border-bottom:1px solid var(--vb);
  padding:7px 20px;display:flex;align-items:center;gap:8px;
  font-size:11px;color:var(--verde);
}
.int-banner svg{width:14px;height:14px;stroke:var(--vmid);fill:none;stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.int-dot{
  width:7px;height:7px;border-radius:50%;background:var(--vmid);
  animation:pulse 2s infinite;flex-shrink:0;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── RESPONSIVE ──────────────────────────────────────────────── */
@media(max-width:600px){
  .header{padding:10px 14px}
  .board{padding:10px 12px 28px;gap:10px}
  .col{flex:0 0 220px}
  .badge-total{display:none}
  .search-wrap input{width:130px}
}
</style>
</head>
<body>

<!-- ── HEADER ── -->
<div class="header">
  <div class="header-brand">
    <div class="hlogo">
      <svg viewBox="0 0 24 24"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/></svg>
    </div>
    <div>
      <h1>Pedidos — Laboratorio FullFarma</h1>
      <p id="headerSub">Cargando...</p>
    </div>
  </div>
  <div class="header-right">
    <span class="badge-total" id="badgeTotal"></span>
    <button class="btn-add" onclick="openForm()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nuevo pedido
    </button>
  </div>
</div>

<!-- ── INTEGRATION BANNER ── -->
<div class="int-banner" id="b1Banner">
  <div class="int-dot"></div>
  <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
  <span id="b1BannerTxt">Integración con B1 activa: los pedidos del formulario de sucursales aparecen aquí automáticamente · Última sincronización: hace 2 min</span>
</div>

<!-- ── FILTROS ── -->
<div class="filter-bar">
  <button class="filter-btn on" onclick="setFilter('all',this)">Todos</button>
  <button class="filter-btn" onclick="setFilter('urgente',this)">🔴 Urgentes</button>
  <div class="filter-sep"></div>
  <button class="filter-btn" onclick="setFilter('Central Guernica',this)">Guernica</button>
  <button class="filter-btn" onclick="setFilter('Central Numancia',this)">Numancia</button>
  <button class="filter-btn" onclick="setFilter('Fullfarma Nueva',this)">Nueva</button>
  <button class="filter-btn" onclick="setFilter('Fullfarma Berlin',this)">Berlin</button>
  <button class="filter-btn" onclick="setFilter('Fullfarma Glew',this)">Glew</button>
  <button class="filter-btn" onclick="setFilter('Fullfarma Rivadavia',this)">Rivadavia</button>
  <div class="filter-sep"></div>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Buscar preparado..." oninput="renderBoard()">
  </div>
</div>

<!-- ── BOARD ── -->
<div class="board" id="board"></div>

<!-- ── MODAL DETALLE ── -->
<div class="modal-bg" id="detailBg" onclick="closeDetail(event)">
  <div class="modal" id="detailModal">
    <div class="modal-hdr">
      <h2 id="dTitle">—</h2>
      <button class="modal-close" onclick="closeDetailDirect()">×</button>
    </div>
    <div class="modal-body" id="dBody"></div>
    <div class="modal-footer">
      <button class="btn-del" onclick="deleteCard()">Eliminar</button>
      <button class="btn-save" onclick="saveDetail()">Guardar cambios</button>
    </div>
  </div>
</div>

<!-- ── FORM NUEVO PEDIDO ── -->
<div class="form-modal" id="formModal" onclick="closeForm(event)">
  <div class="form-box">
    <div class="form-title">Nuevo pedido manual</div>
    <div class="field">
      <label>Preparado / Fórmula <span class="req">*</span></label>
      <input type="text" id="f-prep" placeholder="Ej: Crema AAA, Vaselina azufrada 5%...">
    </div>
    <div class="row-2">
      <div class="field">
        <label>Sucursal <span class="req">*</span></label>
        <select id="f-suc">
          <option value="">Seleccionar...</option>
          <option>Central Guernica</option>
          <option>Central Numancia</option>
          <option>Fullfarma Nueva</option>
          <option>Fullfarma Berlin</option>
          <option>Fullfarma Glew</option>
          <option>Fullfarma Rivadavia</option>
        </select>
      </div>
      <div class="field">
        <label>Urgencia</label>
        <select id="f-urg">
          <option value="normal">Normal</option>
          <option value="urgente">Urgente</option>
        </select>
      </div>
    </div>
    <div class="row-2">
      <div class="field">
        <label>Cantidad</label>
        <input type="text" id="f-cant" placeholder="Ej: 2 unidades">
      </div>
      <div class="field">
        <label>Concentración</label>
        <input type="text" id="f-conc" placeholder="Ej: 5%, 50g">
      </div>
    </div>
    <div class="field">
      <label>Encargado por</label>
      <input type="text" id="f-emp" placeholder="Nombre del empleado que pide">
    </div>
    <div class="field">
      <label>Observaciones</label>
      <textarea id="f-obs" placeholder="Indicaciones especiales, notas del médico..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeFormDirect()">Cancelar</button>
      <button class="btn-create" onclick="createCard()">Crear tarjeta</button>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<script>

const KEY = 'ff_kanban_v1';

  {id:'entregado',   name:'Entregado',     eta:'Cerrado',           dot:'#888780'},
];
const SUCS = ['Central Guernica','Central Numancia','Fullfarma Nueva',
              'Fullfarma Berlin','Fullfarma Glew','Fullfarma Rivadavia'];

// ── STATE ──────────────────────────────────────────────────────────────────
let cards = [], dragId = null, filterVal = 'all', detailId = null;

const DEMO = [

  {id:'PED-20250606-2218',prep:'Diclofenac Gel',suc:'Fullfarma Berlin',emp:'Rodríguez C.',
   cant:'2 unidades',conc:'50g',urg:'normal',obs:'',
   col:'presupuestado',ts:'2025-06-09T14:00:00',esNuevo:false},
  {id:'PED-20250605-8821',prep:'Pasta Bebé Plus',suc:'Central Numancia',emp:'Martínez P.',
   cant:'5 unidades',conc:'60g',urg:'normal',obs:'Para stock de sucursal.',

  {id:'PED-20250604-4490',prep:'Crema para Talones',suc:'Fullfarma Nueva',emp:'Sosa L.',
   cant:'2 unidades',conc:'50g',urg:'normal',obs:'',
   col:'elaboracion',ts:'2025-06-07T10:00:00',esNuevo:false},
  {id:'PED-20250603-9912',prep:'Gotas Hepáticas',suc:'Fullfarma Rivadavia',emp:'Torres M.',
   cant:'3 frascos',conc:'60ml',urg:'urgente',obs:'Cliente crónico, renovación mensual.',
   col:'elaboracion',ts:'2025-06-06T09:00:00',esNuevo:false},
  {id:'PED-20250602-1155',prep:'Magnesio Citrato Cápsulas',suc:'Central Guernica',emp:'García M.',
   cant:'2 cajas',conc:'300mg',urg:'normal',obs:'',
   col:'listo',ts:'2025-06-05T15:00:00',esNuevo:false},
  {id:'PED-20250601-6670',prep:'Acné Loción',suc:'Fullfarma Berlin',emp:'Rodríguez C.',
   cant:'1 unidad',conc:'100ml',urg:'normal',obs:'',
   col:'listo',ts:'2025-06-04T11:00:00',esNuevo:false},
  {id:'PED-20250531-3301',prep:'Cápsulas Arándanos + Vit. C',suc:'Fullfarma Glew',emp:'López R.',
   cant:'3 cajas',conc:'',urg:'normal',obs:'',
   col:'entregado',ts:'2025-06-03T10:00:00',esNuevo:false},
  {id:'PED-20250530-7782',prep:'Crema Antimicótica',suc:'Central Numancia',emp:'Martínez P.',
   cant:'4 unidades',conc:'50g',urg:'normal',obs:'',
   col:'entregado',ts:'2025-06-02T14:00:00',esNuevo:false},
];

// ── INIT ───────────────────────────────────────────────────────────────────
function init(){
  const stored = localStorage.getItem(KEY);
  if(stored){ try{ cards = JSON.parse(stored); }catch{ cards = [...DEMO]; } }
  else { cards = [...DEMO]; save(); }
  renderBoard();
  updateHeader();
  updateB1Banner();
  // Escuchar cambios de localStorage en tiempo real (cuando B1 está abierto en otra pestaña)
  window.addEventListener('storage', e => {
    if(e.key === KEY){
      try{ cards = JSON.parse(e.newValue||'[]'); }catch{}
      renderBoard();
      updateHeader();
      updateB1Banner();
      toast('📋 Nuevo pedido recibido desde B1');
    }
  });
}

function updateB1Banner(){
  const fromB1 = cards.filter(c=>c._fromB1 && c.col!=='entregado');
  const banner  = document.getElementById('b1Banner');
  const bannerTxt = document.getElementById('b1BannerTxt');
  if(!banner) return;
  if(fromB1.length > 0){
    const last = new Date(fromB1[0].ts);
    const mins = Math.floor((Date.now()-last)/60000);
    const timeStr = mins < 1 ? 'hace un momento' : mins < 60 ? `hace ${mins} min` : `hace ${Math.floor(mins/60)}h`;
    bannerTxt.textContent = `Integración con B1 activa: los pedidos del formulario de sucursales aparecen aquí automáticamente · Último: ${timeStr}`;
  } else {
    bannerTxt.textContent = 'Integración con B1 activa: cuando una sucursal envíe un pedido, aparecerá aquí automáticamente en "Recibido"';
  }
}
function save(){ localStorage.setItem(KEY, JSON.stringify(cards)); }
function updateHeader(){
  const active = cards.filter(c=>c.col!=='entregado').length;
  const urg    = cards.filter(c=>c.urg==='urgente'&&c.col!=='entregado').length;
  document.getElementById('badgeTotal').textContent = `${active} activos${urg?' · '+urg+' urgentes':''}`;
  const today = new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('headerSub').textContent = today;
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function renderBoard(){
  const q   = document.getElementById('searchInput').value.toLowerCase();
  const board = document.getElementById('board');
  board.innerHTML = '';

  COLS.forEach(col => {
    let colCards = cards.filter(c => c.col === col.id);
    if(filterVal === 'urgente') colCards = colCards.filter(c=>c.urg==='urgente');
    else if(filterVal !== 'all') colCards = colCards.filter(c=>c.suc===filterVal);
    if(q) colCards = colCards.filter(c=>
      c.prep.toLowerCase().includes(q)||c.suc.toLowerCase().includes(q)||
      c.emp.toLowerCase().includes(q)||(c.id||'').toLowerCase().includes(q));

    const div = document.createElement('div');
    div.className = 'col';
    div.dataset.col = col.id;
    div.innerHTML = `
      <div class="col-header">
        <div class="col-title-row">
          <div class="col-name">
            <div class="col-dot"></div>${col.name}
          </div>
          <span class="col-count">${colCards.length}</span>
        </div>
        <div class="col-eta">${col.eta}</div>
      </div>
      <div class="cards" id="cards-${col.id}" 
           ondragover="onDragOver(event,'${col.id}')"
           ondrop="onDrop(event,'${col.id}')"
           ondragleave="onDragLeave(event,'${col.id}')">
        ${colCards.length===0 ? `<div class="empty-col">Sin pedidos<br>en este estado</div>` : ''}
      </div>`;

    colCards.forEach(c => {
      const cardsEl = div.querySelector('.cards');
      const cardEl  = buildCard(c);
      cardsEl.appendChild(cardEl);
    });

    board.appendChild(div);
  });
  updateHeader();
}

function buildCard(c){
  const el = document.createElement('div');
  el.className = 'card' + (c._new?' new-flash':'');
  el.dataset.id  = c.id;
  el.dataset.urg = c.urg;
  el.draggable   = true;
  if(c._new){ setTimeout(()=>{ c._new=false; save(); }, 700); }

  const days = Math.floor((Date.now()-new Date(c.ts))/(1000*60*60*24));
  let daysCls = 'days-ok', daysLbl = `${days}d`;
  if(days>=3&&c.col!=='entregado') daysCls='days-warn';
  if(days>=6&&c.col!=='entregado') daysCls='days-late';

  el.innerHTML = `
    <div class="card-id">${c.id}</div>
    <div class="card-name">${c.prep}</div>
    <div class="card-meta">${c.cant}${c.conc?' · '+c.conc:''}</div>
    <div class="card-tags">
      <span class="tag tag-suc">${sucShort(c.suc)}</span>
      ${c.urg==='urgente'?'<span class="tag tag-urg">Urgente</span>':''}
      ${c.esNuevo?'<span class="tag tag-new">Nuevo</span>':''}
    </div>
    <div class="card-footer">
      <span class="card-date">${c.emp||'—'}</span>
      <div style="display:flex;align-items:center;gap:5px">
        <span class="days-badge ${daysCls}">${daysLbl}</span>
        <div class="card-actions">
          <button class="card-btn" title="Ver detalle" onclick="event.stopPropagation();openDetail('${c.id}')">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
          <button class="card-btn" title="Avanzar estado" onclick="event.stopPropagation();advance('${c.id}')">
            <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
      </div>
    </div>`;

  el.addEventListener('dragstart', e=>{ dragId=c.id; el.classList.add('dragging'); });
  el.addEventListener('dragend',   e=>{ dragId=null; el.classList.remove('dragging'); });
  el.addEventListener('click', ()=>openDetail(c.id));
  return el;
}

function sucShort(s){
  const m={'Central Guernica':'Guernica','Central Numancia':'Numancia',
           'Fullfarma Nueva':'Nueva','Fullfarma Berlin':'Berlin',
           'Fullfarma Glew':'Glew','Fullfarma Rivadavia':'Rivadavia'};
  return m[s]||s;
}

// ── DRAG & DROP ────────────────────────────────────────────────────────────
function onDragOver(e, colId){
  e.preventDefault();
  document.querySelector(`[data-col="${colId}"]`)?.classList.add('drag-over');
}
function onDragLeave(e, colId){
  document.querySelector(`[data-col="${colId}"]`)?.classList.remove('drag-over');
}
function onDrop(e, colId){
  e.preventDefault();
  document.querySelector(`[data-col="${colId}"]`)?.classList.remove('drag-over');
  if(!dragId) return;
  const c = cards.find(x=>x.id===dragId);
  if(c && c.col !== colId){
    const prev = c.col;
    c.col = colId;
    save(); renderBoard();
    toast(`"${c.prep}" movido a ${colLabel(colId)}`);
    if(colId==='entregado') toast(`✓ Pedido entregado — ${c.id}`);
  }
}

function colLabel(id){ return COLS.find(c=>c.id===id)?.name||id; }

// ── ADVANCE ────────────────────────────────────────────────────────────────
function advance(id){
  const c = cards.find(x=>x.id===id);
  if(!c) return;
  const idx = COLS.findIndex(x=>x.id===c.col);
  if(idx<COLS.length-1){
    c.col = COLS[idx+1].id;
    save(); renderBoard();
    toast(`"${c.prep}" → ${colLabel(c.col)}`);
  }
}

// ── FILTER ────────────────────────────────────────────────────────────────
function setFilter(val, el){
  filterVal = val;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  renderBoard();
}

// ── DETAIL MODAL ───────────────────────────────────────────────────────────
function openDetail(id){
  const c = cards.find(x=>x.id===id);
  if(!c) return;
  detailId = id;
  document.getElementById('dTitle').textContent = c.prep;

  const statusBtns = COLS.map(col=>`
    <button class="status-pill ${c.col===col.id?'active':''}" 
            data-s="${col.id}" onclick="setDetailStatus('${col.id}')">
      ${col.name}
    </button>`).join('');

  document.getElementById('dBody').innerHTML = `
    <div style="margin-bottom:14px">
      <div class="modal-label">Cambiar estado</div>
      <div class="status-row">${statusBtns}</div>
    </div>
    <div class="modal-row">
      <div class="modal-section">
        <div class="modal-label">ID de pedido</div>
        <div class="modal-value" style="font-family:monospace;font-size:11px">${c.id}</div>
      </div>
      <div class="modal-section">
        <div class="modal-label">Urgencia</div>
        <div class="modal-value">
          <select id="d-urg" style="width:100%;padding:5px 8px;border:1px solid var(--gb);border-radius:6px;font-size:12px">
            <option value="normal" ${c.urg==='normal'?'selected':''}>Normal</option>
            <option value="urgente" ${c.urg==='urgente'?'selected':''}>Urgente</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-row">
      <div class="modal-section">
        <div class="modal-label">Sucursal</div>
        <div class="modal-value">${c.suc}</div>
      </div>
      <div class="modal-section">
        <div class="modal-label">Solicitado por</div>
        <div class="modal-value">${c.emp||'—'}</div>
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-label">Cantidad / Concentración</div>
      <div class="modal-value">${c.cant}${c.conc?' · '+c.conc:''}</div>
    </div>
    ${c.obs?`<div class="modal-section">
      <div class="modal-label">Observaciones</div>
      <div class="modal-value" style="font-style:italic">${c.obs}</div>
    </div>`:''}
    <div class="modal-section">
      <div class="modal-label">Notas del laboratorio</div>
      <textarea id="d-notes" style="width:100%;padding:8px 10px;border:1px solid var(--gb);border-radius:8px;font-size:12px;font-family:var(--f);min-height:60px;resize:vertical" 
                placeholder="Precio presupuestado, observaciones de elaboración...">${c.notes||''}</textarea>
    </div>
    <div class="modal-section">
      <div class="modal-label">Fecha de ingreso</div>
      <div class="modal-value">${new Date(c.ts).toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
    </div>`;

  document.getElementById('detailBg').classList.add('open');
}

function setDetailStatus(s){
  document.querySelectorAll('.status-pill').forEach(b=>{
    b.classList.toggle('active', b.dataset.s===s);
  });
}
function closeDetail(e){ if(e.target===document.getElementById('detailBg')) closeDetailDirect(); }
function closeDetailDirect(){ document.getElementById('detailBg').classList.remove('open'); detailId=null; }

function saveDetail(){
  const c = cards.find(x=>x.id===detailId);
  if(!c) return;
  const newStatus = document.querySelector('.status-pill.active')?.dataset.s;
  if(newStatus) c.col = newStatus;
  c.urg   = document.getElementById('d-urg').value;
  c.notes = document.getElementById('d-notes').value;
  save(); renderBoard();
  closeDetailDirect();
  toast('Cambios guardados');
}

function deleteCard(){
  if(!confirm('¿Eliminar este pedido del tablero?')) return;
  cards = cards.filter(x=>x.id!==detailId);
  save(); renderBoard();
  closeDetailDirect();
  toast('Pedido eliminado');
}

// ── CREATE FORM ────────────────────────────────────────────────────────────
function openForm(){ document.getElementById('formModal').classList.add('open'); }
function closeForm(e){ if(e.target===document.getElementById('formModal')) closeFormDirect(); }
function closeFormDirect(){ document.getElementById('formModal').classList.remove('open'); }

function createCard(){
  const prep = document.getElementById('f-prep').value.trim();
  const suc  = document.getElementById('f-suc').value;
  if(!prep||!suc){ toast('Ingresá el preparado y la sucursal'); return; }
  const now = new Date();
  const id  = 'PED-'+now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+
               String(now.getDate()).padStart(2,'0')+'-'+String(Math.floor(Math.random()*9000)+1000);
  const card = {
    id, prep, suc,
    emp:  document.getElementById('f-emp').value.trim(),
    cant: document.getElementById('f-cant').value.trim()||'—',
    conc: document.getElementById('f-conc').value.trim(),
    urg:  document.getElementById('f-urg').value,
    obs:  document.getElementById('f-obs').value.trim(),
    col:'recibido', ts:now.toISOString(), esNuevo:false, _new:true, notes:'',
  };
  cards.unshift(card);
  save(); renderBoard();
  closeFormDirect();
  // Reset form
  ['f-prep','f-suc','f-emp','f-cant','f-conc','f-obs'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('f-urg').value='normal';
  toast('Tarjeta creada en Recibido');
}

// ── TOAST ──────────────────────────────────────────────────────────────────
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove('show'), 2400);
}

init();
</script>
</body>
