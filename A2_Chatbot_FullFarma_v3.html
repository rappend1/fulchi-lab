<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente FullFarma</title>
<style>
:root{
  --v:#27500A;--vbg:#EAF3DE;--vmid:#639922;--vb:#C0DD97;
  --az:#0C447C;--abg:#E6F1FB;--ab:#85B7EB;
  --gb:#D3D1C7;--gl:#F4F2EB;--gm:#888780;--gt:#444441;
  --negro:#1a1a1a;--blanco:#ffffff;
  --f:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --wa:#25D366;--wa-dark:#128C7E;
}
*{box-sizing:border-box;margin:0;padding:0}

/* Cuando se embebe en geco, ocupa todo el viewport */
html,body{height:100%;font-family:var(--f);background:var(--gl)}

/* ── CONTENEDOR PRINCIPAL ── */
.chat-wrap{
  max-width:520px;margin:0 auto;
  min-height:100vh;display:flex;flex-direction:column;
  background:var(--blanco);
  box-shadow:0 0 0 1px var(--gb);
}

/* ── HEADER ── */
.chat-header{
  background:var(--v);color:var(--blanco);
  padding:14px 18px;display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:10;
}
.chat-avatar{
  width:42px;height:42px;border-radius:50%;
  background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.chat-avatar svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.chat-header-text h1{font-size:15px;font-weight:600;line-height:1.2}
.chat-header-text p{font-size:11px;opacity:.8;margin-top:1px;display:flex;align-items:center;gap:4px}
.status-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;flex-shrink:0}

/* ── MENSAJES ── */
.chat-body{
  flex:1;padding:16px 14px 8px;
  display:flex;flex-direction:column;gap:10px;
  overflow-y:auto;
}

/* Burbuja bot */
.msg-bot{
  display:flex;align-items:flex-end;gap:8px;
  max-width:88%;animation:fadeUp .25s ease;
}
.bot-icon{
  width:28px;height:28px;border-radius:50%;background:var(--vbg);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-bottom:2px;
}
.bot-icon svg{width:15px;height:15px;stroke:var(--v);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.bubble-bot{
  background:var(--gl);border:1px solid var(--gb);border-radius:16px 16px 16px 4px;
  padding:10px 14px;font-size:14px;line-height:1.55;color:var(--negro);
}
.bubble-bot strong{color:var(--v)}

/* Burbuja usuario */
.msg-user{
  align-self:flex-end;
  background:var(--v);color:#fff;
  border-radius:16px 16px 4px 16px;
  padding:9px 14px;font-size:14px;line-height:1.5;
  max-width:80%;animation:fadeUp .2s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Typing indicator */
.typing{display:flex;align-items:flex-end;gap:8px;max-width:88%}
.typing-bubble{
  background:var(--gl);border:1px solid var(--gb);
  border-radius:16px 16px 16px 4px;
  padding:12px 16px;display:flex;gap:5px;align-items:center;
}
.typing-dot{
  width:7px;height:7px;border-radius:50%;background:var(--gm);
  animation:bounce .9s ease-in-out infinite;
}
.typing-dot:nth-child(2){animation-delay:.15s}
.typing-dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* ── BOTONES DE OPCIONES ── */
.options-wrap{
  padding:10px 14px 14px;
  display:flex;flex-direction:column;gap:7px;
}
.opt-btn{
  width:100%;padding:11px 16px;
  background:var(--blanco);border:1.5px solid var(--gb);border-radius:10px;
  font-size:13.5px;font-family:var(--f);color:var(--negro);
  cursor:pointer;text-align:left;
  transition:border-color .15s,background .15s,transform .1s;
  display:flex;align-items:center;gap:10px;
  -webkit-tap-highlight-color:transparent;
}
.opt-btn:hover{border-color:var(--vmid);background:var(--vbg)}
.opt-btn:active{transform:scale(.98)}
.opt-btn .opt-icon{font-size:17px;flex-shrink:0}
.opt-btn .opt-text{flex:1;line-height:1.3}
.opt-btn .opt-arrow{color:var(--gm);font-size:14px;flex-shrink:0}

/* Botón WhatsApp */
.wa-btn{
  width:100%;padding:13px 16px;
  background:var(--wa);border:none;border-radius:10px;
  font-size:14px;font-weight:600;font-family:var(--f);color:#fff;
  cursor:pointer;text-align:center;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:background .15s,transform .1s;
  -webkit-tap-highlight-color:transparent;
}
.wa-btn:hover{background:var(--wa-dark)}
.wa-btn:active{transform:scale(.98)}
.wa-btn svg{width:20px;height:20px;fill:#fff;flex-shrink:0}

/* Botón volver */
.back-btn{
  background:none;border:1px solid var(--gb);border-radius:8px;
  padding:8px 14px;font-size:12px;color:var(--gm);
  cursor:pointer;font-family:var(--f);
  transition:background .15s;align-self:flex-start;
  -webkit-tap-highlight-color:transparent;
}
.back-btn:hover{background:var(--gl)}

/* Botón reiniciar */
.restart-btn{
  background:none;border:none;
  font-size:12px;color:var(--gm);
  cursor:pointer;font-family:var(--f);text-decoration:underline;
  padding:4px 0;
  -webkit-tap-highlight-color:transparent;
}

/* ── FOOTER ── */
.chat-footer{
  padding:10px 14px 14px;
  border-top:1px solid var(--gb);
  background:var(--blanco);
}
.footer-note{
  font-size:11px;color:var(--gm);text-align:center;margin-top:8px;line-height:1.5;
}
.footer-note a{color:var(--az);text-decoration:none}

/* ── SUCURSAL CARDS ── */
.suc-cards{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.suc-card{background:var(--blanco);border:1px solid var(--gb);border-radius:10px;padding:11px 13px;display:flex;align-items:center;gap:10px}
.suc-info{flex:1}
.suc-name{font-size:13px;font-weight:600;color:var(--negro);margin-bottom:2px}
.suc-addr{font-size:11px;color:var(--gm);margin-bottom:2px}
.suc-hrs{font-size:11px;color:var(--az)}
.suc-wa{width:38px;height:38px;background:#25D366;border:none;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .15s;-webkit-tap-highlight-color:transparent}
.suc-wa:hover{background:#1fa855}
.suc-wa svg{width:20px;height:20px;fill:#fff}

/* ── CALENDARIO DE GUARDIAS ── */
.cal-wrap{margin-top:8px;display:flex;flex-direction:column;gap:12px}
.cal-suc-title{font-size:13px;font-weight:600;color:var(--negro);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.cal-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.cal-month{background:var(--gl);border:1px solid var(--gb);border-radius:8px;padding:8px 10px}
.cal-month-name{font-size:10px;font-weight:600;color:var(--gm);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.cal-days{display:flex;flex-wrap:wrap;gap:4px}
.cal-day{width:26px;height:26px;border-radius:50%;background:var(--v);color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center}
.cal-empty{font-size:11px;color:var(--gb);font-style:italic}
.cal-divider{height:1px;background:var(--gb);margin:4px 0}
</style>
</head>

// ══ ESTADO ══════════════════════════════════════════════════════════════════
let historial = [];

// ══ DOM ═════════════════════════════════════════════════════════════════════
const chatBody   = document.getElementById('chatBody');
const optWrap    = document.getElementById('optionsWrap');

// ══ RENDER MENSAJE ══════════════════════════════════════════════════════════
function addBotMsg(text, delay=0){
  return new Promise(resolve => {
    // Typing indicator
    const typing = document.createElement('div');
    typing.className='typing';
    typing.innerHTML=`
      <div class="bot-icon"><svg viewBox="0 0 24 24"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></div>
      <div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
    chatBody.appendChild(typing);
    scrollBottom();

    setTimeout(()=>{
      typing.remove();
      const wrap = document.createElement('div');
      wrap.className='msg-bot';
      wrap.innerHTML=`
        <div class="bot-icon"><svg viewBox="0 0 24 24"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></div>
        <div class="bubble-bot">${text.replace(/\n/g,'<br>')}</div>`;
      chatBody.appendChild(wrap);
      scrollBottom();
      resolve();
    }, delay || 600);
  });
}

function addUserMsg(text){
  const el = document.createElement('div');
  el.className='msg-user';
  el.textContent=text;
  chatBody.appendChild(el);
  scrollBottom();
}

// ══ RENDER OPCIONES ══════════════════════════════════════════════════════════
function renderOpts(nodeId){
  const node = TREE[nodeId];
  if(!node) return;
  optWrap.innerHTML='';

  node.opts.forEach(opt=>{
    if(opt.action){
      // Acciones externas (links)
      if(opt.action.startsWith('wa_') || opt.action==='wa_general'){
        // Botón WhatsApp
        const btn = document.createElement('button');
        btn.className='wa-btn';
        btn.innerHTML=`
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.555 4.116 1.527 5.845L.057 23.486c-.094.32.007.664.259.894.181.163.415.248.654.248.078 0 .157-.01.234-.03l5.86-1.528A11.945 11.945 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.938 0-3.77-.497-5.363-1.373l-.38-.213-3.938 1.027 1.004-3.813-.228-.374A9.96 9.96 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
          ${opt.text}`;
        btn.onclick=()=>{
          addUserMsg(opt.text);
          optWrap.innerHTML='';
          setTimeout(()=>window.open(ACTIONS[opt.action],'_blank'),400);
          setTimeout(()=>{ renderOpts('inicio'); }, 1200);
        };
        optWrap.appendChild(btn);
      } else {
        // Link normal (Maps, tienda, etc.)
        const btn = document.createElement('button');
        btn.className='opt-btn';
        btn.innerHTML=`<span class="opt-icon">${opt.icon}</span><span class="opt-text">${opt.text}</span><span class="opt-arrow">↗</span>`;
        btn.onclick=()=>{
          addUserMsg(opt.text);
          optWrap.innerHTML='';
          window.open(ACTIONS[opt.action],'_blank');
          setTimeout(()=>{ renderOpts('inicio'); }, 800);
        };
        optWrap.appendChild(btn);
      }
    } else if(opt.next){
      const btn = document.createElement('button');
      btn.className='opt-btn';
      btn.innerHTML=`<span class="opt-icon">${opt.icon}</span><span class="opt-text">${opt.text}</span><span class="opt-arrow">›</span>`;
      btn.onclick=()=>navigate(opt.text, opt.next);
      optWrap.appendChild(btn);
    }
  });

  // Botón reiniciar (si no está en inicio)
  if(nodeId !== 'inicio' && historial.length > 0){
    const restart = document.createElement('button');
    restart.className='restart-btn';
    restart.textContent='↩ Volver al inicio';
    restart.onclick=()=>{
      historial=[];
      addUserMsg('Volver al inicio');
      goTo('inicio');
    };
    optWrap.appendChild(restart);
  }
}

function renderGuardias(container){
  const DATA = [
    { suc:'Fullfarma Espora', addr:'Miguel Cané 240 – Glew', meses:[
      { m:'Abril',      dias:[22] },
      { m:'Mayo',       dias:[4,14,24] },

      { m:'Octubre',    dias:[2,14,26] },
      { m:'Noviembre',  dias:[7,19] },
      { m:'Diciembre',  dias:[1,13] },
    ]},
    { suc:'Fullfarma Glew', addr:'Av. H. Irigoyen 20906 – Glew', meses:[
      { m:'Abril',      dias:[11,23] },
      { m:'Mayo',       dias:[] },
      { m:'Junio',      dias:[5,17,29] },
      { m:'Julio',      dias:[11,23] },
      { m:'Agosto',     dias:[4,28] },
      { m:'Septiembre', dias:[9,21] },
      { m:'Octubre',    dias:[3,15,27] },
      { m:'Noviembre',  dias:[8,20] },
      { m:'Diciembre',  dias:[2,14,26] },
    ]},
  ];
  const wrap = document.createElement('div'); wrap.className='cal-wrap';
  DATA.forEach((suc,si)=>{
    if(si>0){ const d=document.createElement('div'); d.className='cal-divider'; wrap.appendChild(d); }
    const title=document.createElement('div'); title.className='cal-suc-title';
    title.innerHTML=`🏪 ${suc.suc} <span style="font-size:10px;color:var(--gm);font-weight:400">— ${suc.addr}</span>`;
    wrap.appendChild(title);
    const grid=document.createElement('div'); grid.className='cal-grid';
    suc.meses.forEach(mes=>{
      const box=document.createElement('div'); box.className='cal-month';
      const name=document.createElement('div'); name.className='cal-month-name'; name.textContent=mes.m;
      box.appendChild(name);
      const days=document.createElement('div'); days.className='cal-days';
      if(mes.dias.length===0){
        const empty=document.createElement('span'); empty.className='cal-empty'; empty.textContent='Sin guardia';
        days.appendChild(empty);
      } else {
        mes.dias.forEach(d=>{ const el=document.createElement('div'); el.className='cal-day'; el.textContent=d; days.appendChild(el); });
      }
      box.appendChild(days); grid.appendChild(box);
    });
    wrap.appendChild(grid);
  });
  container.appendChild(wrap);
}

async function goTo(nodeId){
  const node = TREE[nodeId];
  if(!node) return;
  optWrap.innerHTML='';
  await addBotMsg(node.msg);
  // Inyectar contenido especial después de la burbuja
  if(node.type === 'sucursales'){
    const lastBubble = chatBody.lastElementChild?.querySelector('.bubble-bot');
    if(lastBubble) renderSucursales(lastBubble);
  } else if(node.type === 'guardias'){
    const lastBubble = chatBody.lastElementChild?.querySelector('.bubble-bot');
    if(lastBubble) renderGuardias(lastBubble);
  }
  renderOpts(nodeId);
}

function navigate(label, nodeId){
  historial.push(nodeId);
  addUserMsg(label);
  optWrap.innerHTML='';
  goTo(nodeId);
}

function scrollBottom(){
  setTimeout(()=>chatBody.scrollTop=chatBody.scrollHeight, 50);
}

// ══ INICIO ══════════════════════════════════════════════════════════════════
window.onload=()=>{
  addBotMsg('¡Hola! 👋 Soy el asistente de <strong>Farmacia Nueva Fulchi</strong>.\n\n¿En qué puedo ayudarte hoy?', 400)
    .then(()=>renderOpts('inicio'));
};
